server:
  port: 8080

spring:
  datasource:
    url: ${TRACKPRO_DB_URL:jdbc:postgresql://localhost:5432/trackpro}
    username: ${TRACKPRO_DB_USER:trackpro}
    password: ${TRACKPRO_DB_PASSWORD:trackpro}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${TRACKPRO_REDIS_HOST:localhost}
      port: ${TRACKPRO_REDIS_PORT:6379}

trackpro:
  bootstrap:
    admin:
      enabled: ${TRACKPRO_BOOTSTRAP_ADMIN_ENABLED:true}
      email: ${TRACKPRO_BOOTSTRAP_ADMIN_EMAIL:admin@trackpro.local}
      password: ${TRACKPRO_BOOTSTRAP_ADMIN_PASSWORD:admin123!}
      display-name: ${TRACKPRO_BOOTSTRAP_ADMIN_DISPLAY_NAME:Admin}
  security:
    jwt:
      issuer: ${TRACKPRO_JWT_ISSUER:trackpro}
      secret: ${TRACKPRO_JWT_SECRET:dev-change-me-dev-change-me-dev-change-me-dev-change-me}
      access-token-ttl: PT15M
      refresh-token-ttl: P7D

trackpro:
  telemetry:
    tcp:
      port: ${TRACKPRO_TCP_PORT:5023}
      enabled: ${TRACKPRO_TCP_ENABLED:true}
    mqtt:
      broker-url: ${TRACKPRO_MQTT_BROKER:tcp://localhost:1883}
      client-id: ${TRACKPRO_MQTT_CLIENT_ID:trackpro-backend}
      username: ${TRACKPRO_MQTT_USER:}
      password: ${TRACKPRO_MQTT_PASS:}
      topic-prefix: ${TRACKPRO_MQTT_TOPIC_PREFIX:trackpro/devices}
      enabled: ${TRACKPRO_MQTT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
