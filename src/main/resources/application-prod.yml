server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: ${TRACKPRO_DB_URL}
    username: ${TRACKPRO_DB_USER}
    password: ${TRACKPRO_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${TRACKPRO_REDIS_HOST}
      port: ${TRACKPRO_REDIS_PORT:6379}
      password: ${TRACKPRO_REDIS_PASSWORD:}

trackpro:
  security:
    jwt:
      access-token-ttl: PT1H
      refresh-token-ttl: P30D
  sms:
    provider: ${SMS_PROVIDER:termii}
    termii:
      api-key: ${TERMII_API_KEY:}
      sender-id: ${TERMII_SENDER_ID:N-Alert}
      base-url: ${TERMII_BASE_URL:https://api.ng.termii.com}
    africastalking:
      api-key: ${AT_API_KEY:}
      username: ${AT_USERNAME:}
      sender-id: ${AT_SENDER_ID:STTracker}
      sandbox-mode: ${AT_SANDBOX:false}
    webhook:
      shared-secret: ${SMS_WEBHOOK_SECRET:}
    delivery-status:
      enabled: ${SMS_DELIVERY_STATUS_ENABLED:true}
    server:
      host: ${TRACKPRO_SERVER_HOST}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
