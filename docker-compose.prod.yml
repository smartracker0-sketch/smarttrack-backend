version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: trackpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackpro}
      POSTGRES_USER: ${POSTGRES_USER:-trackpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trackpro-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT (optional — set TRACKPRO_MQTT_ENABLED=false to skip) ────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: trackpro-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
    networks:
      - internal

  # ── Spring Boot backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trackpro-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TRACKPRO_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-trackpro}
      TRACKPRO_DB_USER: ${POSTGRES_USER:-trackpro}
      TRACKPRO_DB_PASSWORD: ${POSTGRES_PASSWORD}
      TRACKPRO_REDIS_HOST: redis
      TRACKPRO_REDIS_PORT: 6379
      TRACKPRO_REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRACKPRO_JWT_SECRET: ${TRACKPRO_JWT_SECRET}
      TRACKPRO_JWT_ISSUER: ${TRACKPRO_JWT_ISSUER:-trackpro}
      TRACKPRO_BOOTSTRAP_ADMIN_ENABLED: ${TRACKPRO_BOOTSTRAP_ADMIN_ENABLED:-true}
      TRACKPRO_BOOTSTRAP_ADMIN_EMAIL: ${TRACKPRO_BOOTSTRAP_ADMIN_EMAIL}
      TRACKPRO_BOOTSTRAP_ADMIN_PASSWORD: ${TRACKPRO_BOOTSTRAP_ADMIN_PASSWORD}
      TRACKPRO_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${TRACKPRO_BOOTSTRAP_ADMIN_DISPLAY_NAME:-Admin}
      TRACKPRO_TCP_PORT: ${TRACKPRO_TCP_PORT:-5023}
      TRACKPRO_TCP_ENABLED: ${TRACKPRO_TCP_ENABLED:-true}
      TRACKPRO_SERVER_HOST: ${TRACKPRO_SERVER_HOST}
      TRACKPRO_DEVICE_SECRET_KEY: ${TRACKPRO_DEVICE_SECRET_KEY}
      SMS_PROVIDER: ${SMS_PROVIDER:-termii}
      SMS_WEBHOOK_SECRET: ${SMS_WEBHOOK_SECRET}
      SMS_DELIVERY_STATUS_ENABLED: ${SMS_DELIVERY_STATUS_ENABLED:-true}
      TERMII_API_KEY: ${TERMII_API_KEY:-}
      TERMII_SENDER_ID: ${TERMII_SENDER_ID:-N-Alert}
      TERMII_BASE_URL: ${TERMII_BASE_URL:-https://api.ng.termii.com}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      AT_SENDER_ID: ${AT_SENDER_ID:-STTracker}
      AT_SANDBOX: ${AT_SANDBOX:-false}
      TRACKPRO_MQTT_BROKER: tcp://mosquitto:1883
      TRACKPRO_MQTT_ENABLED: ${TRACKPRO_MQTT_ENABLED:-true}
      TRACKPRO_MQTT_CLIENT_ID: ${TRACKPRO_MQTT_CLIENT_ID:-trackpro-backend}
    ports:
      - "5023:5023"   # Netty TCP — GPS tracker port
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: trackpro-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - web

  # ── Certbot (SSL — run once then renews automatically) ──────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: trackpro-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL}
      --agree-tos --no-eff-email
      -d ${DOMAIN}

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
    internal: true
  web:
    driver: bridge
