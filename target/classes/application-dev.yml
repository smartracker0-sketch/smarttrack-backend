server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:h2:file:./data/trackpro;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

trackpro:
  bootstrap:
    admin:
      enabled: true
      email: ${TRACKPRO_BOOTSTRAP_ADMIN_EMAIL:admin@trackpro.local}
      password: ${TRACKPRO_BOOTSTRAP_ADMIN_PASSWORD:admin123!}
      display-name: ${TRACKPRO_BOOTSTRAP_ADMIN_DISPLAY_NAME:Admin}
  security:
    jwt:
      issuer: ${TRACKPRO_JWT_ISSUER:trackpro}
      secret: ${TRACKPRO_JWT_SECRET:dev-change-me-dev-change-me-dev-change-me-dev-change-me}
      access-token-ttl: PT8H
      refresh-token-ttl: P7D
  telemetry:
    tcp:
      port: 5023
      enabled: true
    mqtt:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
